# Paste this snippet into the "Advanced" tab of the Proxy Host for
# portfolio.printmarksgraphics.cloud in Nginx Proxy Manager.
#
# Routes /api/* to the Express container; everything else falls through to the
# default upstream defined in the Details tab (portfolio-web:80).

location /api/ {
  proxy_pass http://portfolio-api:3001/api/;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 60s;
}
